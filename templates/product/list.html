{% extends 'base.html' %}

{% block content %}
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Mahsulotlar</h1>
        <a href="{% url 'create' %}" class="btn btn-primary shadow-sm">+ Mahsulot qo'shish</a>
    </div>

    <div class="row g-4">
        {% for i in product %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body d-flex flex-column">
                    <span class="text-muted small mb-1">#{{ i.id }}</span>
                    <a href="{% url 'detail' i.pk %}" class="fs-5 fw-semibold text-decoration-none text-dark mb-2">
                        {{ i.title }}
                    </a>
                    <p class="text-primary fw-bold mb-2">{{ i.price }} so'm</p>
                    <p class="text-muted small flex-grow-1">{{ i.description }}</p>
                    <p class="text-muted small mb-3">{{ i.created_at }}</p>

                    <div class="d-flex gap-2 border-top pt-3 mt-auto">
                        <a href="{% url 'update' i.pk %}" class="btn btn-warning btn-sm flex-fill">Tahrirlash</a>
                        <a href="{% url 'delete' i.pk %}" class="btn btn-danger btn-sm flex-fill">O'chirish</a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-muted text-center">Mahsulotlar mavjud emas.</p>
        {% endfor %}
    </div>

</div>
{% endblock content %}
